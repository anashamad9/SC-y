openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CyberCultX Human Risk Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: departments
    description: Department management
  - name: assessments
    description: Psychometric and cyber behavior assessments
  - name: courses
    description: Learning courses and progress
  - name: scores
    description: Risk and culture scores
  - name: gamification
    description: XP, badges, leaderboard
  - name: phishing
    description: Phishing simulation templates and campaigns
  - name: reports
    description: Report generation and download
  - name: admin
    description: Admin management operations
  - name: superadmin
    description: Super admin and tenant management
  - name: executive
    description: Executive intelligence dashboard
  - name: hr
    description: HR people-analytics dashboard
  - name: ai
    description: AI security intelligence assistant

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          description: Invalid or expired refresh token

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/mfa/setup:
    post:
      operationId: setupMfa
      tags: [auth]
      summary: Setup MFA - returns TOTP secret and QR URI
      responses:
        "200":
          description: MFA setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /auth/mfa/verify:
    post:
      operationId: verifyMfa
      tags: [auth]
      summary: Verify MFA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyInput"
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid code

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: departmentId
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/stats/summary:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics summary
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List available assessments
      responses:
        "200":
          description: List of assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"

  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get assessment with questions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessment with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentDetail"

  /assessments/{id}/submit:
    post:
      operationId: submitAssessment
      tags: [assessments]
      summary: Submit assessment answers
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentSubmission"
      responses:
        "200":
          description: Assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"

  /assessments/{id}/results:
    get:
      operationId: getAssessmentResults
      tags: [assessments]
      summary: Get user's results for an assessment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"
        "404":
          description: No result found

  /assessments/profile:
    get:
      operationId: getPsychometricProfile
      tags: [assessments]
      summary: Get current user's psychometric profile
      responses:
        "200":
          description: Psychometric profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PsychometricProfile"
        "404":
          description: Profile not found

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses with optional filters
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: string
      responses:
        "200":
          description: List of courses with user progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithProgress"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get course details with lessons
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found

  /courses/{id}/progress:
    patch:
      operationId: updateCourseProgress
      tags: [courses]
      summary: Update user's progress on a course
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseProgressUpdate"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseProgress"

  /courses/learning-path:
    get:
      operationId: getLearningPath
      tags: [courses]
      summary: Get recommended learning path for current user
      responses:
        "200":
          description: Personalized learning path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningPath"

  /scores/me:
    get:
      operationId: getMyScores
      tags: [scores]
      summary: Get current user's full score profile
      responses:
        "200":
          description: User score profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserScores"

  /scores/cci-history:
    get:
      operationId: getCciHistory
      tags: [scores]
      summary: Get CCI and HRS historical snapshots for trend chart
      responses:
        "200":
          description: CCI history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CciHistory"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [gamification]
      summary: Get XP leaderboard
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /gamification/me:
    get:
      operationId: getMyGamification
      tags: [gamification]
      summary: Get current user's gamification profile
      responses:
        "200":
          description: Gamification profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamificationProfile"

  /gamification/badges:
    get:
      operationId: getMyBadges
      tags: [gamification]
      summary: Get current user's earned badges
      responses:
        "200":
          description: User badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserBadgeDetail"

  /auth/complete-onboarding:
    post:
      operationId: completeOnboarding
      tags: [auth]
      summary: Mark onboarding wizard as completed
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Onboarding marked complete
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean

  /telemetry/event:
    post:
      operationId: recordTelemetryEvent
      tags: [telemetry]
      summary: Record a behavioral telemetry event
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryEventInput"
      responses:
        "200":
          description: Event recorded
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean

  /phishing/templates:
    get:
      operationId: listPhishingTemplates
      tags: [phishing]
      summary: List phishing templates
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: language
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: integer
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of phishing templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingTemplateList"
    post:
      operationId: createPhishingTemplate
      tags: [phishing]
      summary: Create a phishing template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingTemplate"

  /phishing/templates/generate:
    post:
      operationId: generatePhishingTemplate
      tags: [phishing]
      summary: Generate a phishing template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingGenerateInput"
      responses:
        "200":
          description: Generated phishing content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingGenerateResult"

  /phishing/templates/{id}:
    get:
      operationId: getPhishingTemplate
      tags: [phishing]
      summary: Get phishing template by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phishing template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingTemplate"
        "404":
          description: Not found
    patch:
      operationId: updatePhishingTemplate
      tags: [phishing]
      summary: Update phishing template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingTemplateInput"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingTemplate"
    delete:
      operationId: deletePhishingTemplate
      tags: [phishing]
      summary: Delete phishing template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /phishing/campaigns:
    get:
      operationId: listPhishingCampaigns
      tags: [phishing]
      summary: List phishing campaigns
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaignList"
    post:
      operationId: createPhishingCampaign
      tags: [phishing]
      summary: Create a phishing campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingCampaignInput"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaign"

  /phishing/campaigns/{id}:
    get:
      operationId: getPhishingCampaign
      tags: [phishing]
      summary: Get campaign by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaignDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePhishingCampaign
      tags: [phishing]
      summary: Update campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingCampaignInput"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaign"
    delete:
      operationId: deletePhishingCampaign
      tags: [phishing]
      summary: Delete campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /phishing/campaigns/{id}/launch:
    post:
      operationId: launchPhishingCampaign
      tags: [phishing]
      summary: Launch a campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Launched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaign"

  /phishing/campaigns/{id}/results:
    get:
      operationId: getCampaignResults
      tags: [phishing]
      summary: Get per-employee results for a campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Campaign results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResultsList"

  /phishing/my-results:
    get:
      operationId: getMyPhishingResults
      tags: [phishing]
      summary: Get current employee's phishing result history
      responses:
        "200":
          description: Employee phishing results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyPhishingResults"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List report jobs
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportJob"

  /reports/generate:
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportGenerateInput"
      responses:
        "200":
          description: Report job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"

  /reports/{id}/download:
    get:
      operationId: downloadReport
      tags: [reports]
      summary: Download a report file
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report file download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"
        "404":
          description: Not found

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide admin statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /tenants:
    get:
      operationId: listTenants
      tags: [superadmin]
      summary: List all tenants
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantList"
    post:
      operationId: createTenant
      tags: [superadmin]
      summary: Create a new tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [superadmin]
      summary: Get tenant by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
    patch:
      operationId: updateTenant
      tags: [superadmin]
      summary: Update tenant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /system/config:
    get:
      operationId: getSystemConfig
      tags: [superadmin]
      summary: Get all system configuration values
      responses:
        "200":
          description: System config
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemConfigItem"
    patch:
      operationId: updateSystemConfig
      tags: [superadmin]
      summary: Update system configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemConfigUpdate"
      responses:
        "200":
          description: Updated config item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfigItem"

  /system/health:
    get:
      operationId: getSystemHealth
      tags: [superadmin]
      summary: Get system health and monitoring metrics
      responses:
        "200":
          description: System health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [superadmin]
      summary: List audit log events
      parameters:
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  /telemetry/trends:
    get:
      operationId: getTelemetryTrends
      tags: [telemetry]
      summary: Get current user's behavioral telemetry trends
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Telemetry trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryTrendsResponse"

  /users/{id}/delete:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted successfully }
        "404": { description: User not found }

  /courses/{id}/manage:
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course (superadmin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Course" }
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course (superadmin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted successfully }

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [superadmin]
      summary: Get all platform settings from system config
      responses:
        "200":
          description: Map of setting key to value
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /admin/settings/{key}:
    put:
      operationId: updateAdminSetting
      tags: [superadmin]
      summary: Update a single platform setting
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string }
      responses:
        "200": { description: Updated }

  /admin/assessments/{id}/results:
    get:
      operationId: getAssessmentResults
      tags: [admin]
      summary: Get paginated employee results for an assessment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Assessment results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { type: object }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /admin/notifications:
    get:
      operationId: listAdminNotifications
      tags: [superadmin]
      summary: List platform announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    title: { type: string }
                    body: { type: string }
                    type: { type: string, enum: [info, warning, critical] }
                    audience: { type: string, enum: [all, employee, admin] }
                    createdAt: { type: string }
                    active: { type: boolean }
    post:
      operationId: createAdminNotification
      tags: [superadmin]
      summary: Create a new announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title: { type: string }
                body: { type: string }
                type: { type: string, enum: [info, warning, critical] }
                audience: { type: string, enum: [all, employee, admin] }
      responses:
        "201": { description: Created announcement }

  /admin/notifications/{id}:
    delete:
      operationId: deleteAdminNotification
      tags: [superadmin]
      summary: Remove a platform announcement
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Deleted successfully }

  /executive/dashboard:
    get:
      operationId: getExecutiveDashboard
      tags: [executive]
      summary: Get executive org-wide risk intelligence dashboard
      responses:
        "200":
          description: Executive dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveDashboard"
        "403": { description: Forbidden }

  /hr/dashboard:
    get:
      operationId: getHRDashboard
      tags: [hr]
      summary: Get HR people-analytics dashboard
      responses:
        "200":
          description: HR dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HRDashboard"
        "403": { description: Forbidden }

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Stream AI security intelligence response (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIChatRequest"
      responses:
        "200":
          description: SSE stream of AI response chunks
          content:
            text/event-stream:
              schema:
                type: string

  /predictive/org:
    get:
      operationId: getPredictiveOrg
      tags: [predictive]
      summary: Get org-level predictive risk indicators
      responses:
        "200":
          description: Org predictive risk indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictiveOrgResponse"
        "403": { description: Forbidden }

  /predictive/employee/{id}:
    get:
      operationId: getPredictiveEmployee
      tags: [predictive]
      summary: Get employee-level predictive risk indicators
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employee predictive risk indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictiveEmployeeResponse"
        "403": { description: Forbidden }
        "404": { description: Employee not found }

  /reports/arabic-pdf:
    get:
      operationId: getArabicPdfReport
      tags: [reports]
      summary: Generate Arabic RTL PDF security intelligence report
      responses:
        "200":
          description: PDF report (RTL Arabic)
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403": { description: Forbidden }

